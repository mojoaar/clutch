name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install

      - run: pnpm tauri build --target ${{ matrix.target }}

      - if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: clutch-macos-aarch64
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: clutch-linux-x86_64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: clutch-windows-x86_64
          path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            clutch-macos-aarch64/**
            clutch-linux-x86_64/**
            clutch-windows-x86_64/**
          generate_release_notes: true
